trigger:
  branches:
    include:
      - main

# PR validation: builds + tests run, but deploy stages skip on PR builds
# via the Build.Reason check below.
pr:
  branches:
    include:
      - "*"

parameters:
  - name: deployToProd
    displayName: Promote to Production after Dev succeeds?
    type: boolean
    default: false

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.0.x'
  apiProject: '1RadAPI/1RadAPI.csproj'
  testProjects: '1Rad.UnitTests/1Rad.UnitTests.csproj'

  # Dev
  devServiceConnection: 'onerad'
  devAppName: '1RadAPI'

  # Prod
  prodServiceConnection: '1RadAPIProd'
  prodAppName: '1RadAPIProd'
  prodResourceGroup: 'website-prod-rg'
  prodStagingSlot: 'staging'

stages:
  # ────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build & Test
  # Runs on every main push AND every PR (CI validation).
  # The published zip is uploaded as an artifact so both deploy stages
  # consume the SAME binary (no drift between environments).
  # ────────────────────────────────────────────────────────────────────────
  - stage: Build_and_Test
    displayName: Build & Test API
    jobs:
      - job: Build
        displayName: Restore / Build / Test / Publish
        timeoutInMinutes: 30
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - task: DotNetCoreCLI@2
            displayName: 'Restore API'
            inputs:
              command: 'restore'
              projects: '$(apiProject)'

          - task: DotNetCoreCLI@2
            displayName: 'Build API'
            inputs:
              command: 'build'
              projects: '$(apiProject)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run Unit Tests'
            inputs:
              command: 'test'
              projects: '$(testProjects)'
              arguments: '--configuration $(buildConfiguration) --no-build --logger trx --collect:"XPlat Code Coverage"'
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(apiProject)'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish'
              zipAfterPublish: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish API artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/publish'
              artifact: 'api-package'
              publishLocation: 'pipeline'

  # ────────────────────────────────────────────────────────────────────────
  # Stage 2 — Deploy to Dev App Service
  # Auto-deploys on main. Skipped on PR builds.
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy to Dev (App Service)
    dependsOn: Build_and_Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployDev
        displayName: Push to Dev App Service
        environment: 'Dev-API'
        timeoutInMinutes: 30
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: api-package

                - task: AzureWebApp@1
                  displayName: 'Deploy to Dev App Service'
                  inputs:
                    azureSubscription: '$(devServiceConnection)'
                    appType: 'webApp'
                    appName: '$(devAppName)'
                    package: '$(Pipeline.Workspace)/api-package/**/*.zip'

  # ────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy to Prod App Service (slot-swap, zero downtime)
  # Runs ONLY when:
  #   (1) Dev deploy succeeded
  #   (2) The run was queued with deployToProd: true
  #   (3) An approver clicks Approve on the 'Production-API' environment.
  #
  # Approval is configured in Azure DevOps → Pipelines → Environments →
  # Production-API → Approvals and checks.
  #
  # Flow:
  #   a. Download the SAME artifact built in Stage 1
  #   b. Deploy zip to the 'staging' slot (no live-traffic impact)
  #   c. Hit /health on the staging slot to warm it up
  #   d. Swap staging ↔ production (atomic, near-zero downtime)
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployProd
    displayName: Deploy to Prod (App Service)
    dependsOn: DeployDev
    condition: and(succeeded(), eq('${{ parameters.deployToProd }}', true), ne(variables['Build.Reason'], 'PullRequest'))
    variables:
      # Variable group `api-prod-secrets` holds the Prod connection strings,
      # JWT keys, third-party API keys, etc. Each variable is marked as
      # 'secret' in the DevOps Library UI. The values are pushed to the
      # STAGING slot in the AzureAppServiceSettings step below — when the
      # slot swaps, they travel with the code to production.
      - group: api-prod-secrets
    jobs:
      - deployment: DeployProd
        displayName: Deploy to Prod staging slot, then swap
        environment: 'Production-API'
        timeoutInMinutes: 60
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: api-package

                - script: |
                    echo ===== PROD DEPLOY =====
                    echo Commit:     $(Build.SourceVersion)
                    echo Branch:     $(Build.SourceBranchName)
                    echo Queued by:  $(Build.RequestedFor)
                    echo Pipeline:   $(Build.BuildNumber)
                    echo App:        $(prodAppName)
                    echo Slot:       $(prodStagingSlot) -> production
                    echo RG:         $(prodResourceGroup)
                  displayName: 'Prod deploy audit log'

                # 1) Push Prod app settings + connection strings to the STAGING
                #    slot BEFORE the deploy. .NET nested config uses '__' as
                #    the section separator (e.g. ConnectionStrings:Default →
                #    ConnectionStrings__Default). Each value below references a
                #    secret variable from the 'api-prod-secrets' variable group.
                #
                #    slotSetting: false → the value SWAPS with the code (what
                #    we want for app config). Things that must stay slot-bound
                #    (e.g. ASPNETCORE_ENVIRONMENT) should be set manually in
                #    the Portal with "Deployment slot setting" ticked, NOT
                #    here.
                - task: AzureAppServiceSettings@1
                  displayName: 'Apply Prod app settings + connection strings'
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    appName: '$(prodAppName)'
                    resourceGroupName: '$(prodResourceGroup)'
                    slotName: '$(prodStagingSlot)'
                    appSettings: |
                      [
                        { "name": "ASPNETCORE_DETAILEDERRORS",        "value": "false",                              "slotSetting": false },
                        { "name": "JwtSettings__SecretKey",           "value": "$(ProdJwtSecretKey)",                "slotSetting": false },
                        { "name": "JwtSettings__Issuer",              "value": "$(ProdJwtIssuer)",                   "slotSetting": false },
                        { "name": "JwtSettings__Audience",            "value": "$(ProdJwtAudience)",                 "slotSetting": false },
                        { "name": "AzureStorage__ConnectionString",   "value": "$(ProdAzureStorageConnectionString)","slotSetting": false },
                        { "name": "AzureStorage__ContainerName",      "value": "$(ProdAzureStorageContainerName)",   "slotSetting": false }
                      ]
                    connectionStrings: |
                      [
                        { "name": "DefaultConnection", "value": "$(ProdDbConnectionString)", "type": "SQLAzure", "slotSetting": false }
                      ]

                # 2) Push the zip to the staging slot — live traffic untouched
                - task: AzureWebApp@1
                  displayName: 'Deploy to Prod staging slot'
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    appType: 'webApp'
                    appName: '$(prodAppName)'
                    deployToSlotOrASE: true
                    resourceGroupName: '$(prodResourceGroup)'
                    slotName: '$(prodStagingSlot)'
                    package: '$(Pipeline.Workspace)/api-package/**/*.zip'

                # 3) Warm up the staging slot so the swap is instant.
                #    Hits /api/v1/health on the staging slot up to 5 times. The
                #    HealthController returns 200 with JSON {"Status":"Healthy"}
                #    when the app has booted. Best-effort — falls through after
                #    5 attempts so a slow boot doesn't fail the deploy on its own.
                - task: PowerShell@2
                  displayName: 'Warm up staging slot'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $url = "https://$(prodAppName)-$(prodStagingSlot).azurewebsites.net/api/v1/health"
                      Write-Host "Warming up: $url"
                      for ($i = 1; $i -le 5; $i++) {
                        try {
                          $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30
                          Write-Host "Attempt $i -> $($r.StatusCode)"
                          if ($r.StatusCode -eq 200) { break }
                        } catch {
                          Write-Host "Attempt $i -> error: $($_.Exception.Message)"
                        }
                        Start-Sleep -Seconds 8
                      }

                # 4) Atomic swap. After this step finishes, the new build is
                #    serving production traffic and the OLD build is on the
                #    staging slot — kept for instant rollback.
                - task: AzureAppServiceManage@0
                  displayName: 'Swap staging → production'
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    action: 'Swap Slots'
                    webAppName: '$(prodAppName)'
                    resourceGroupName: '$(prodResourceGroup)'
                    sourceSlot: '$(prodStagingSlot)'
                    swapWithProduction: true

                # 5) Smoke test the LIVE production /api/v1/health endpoint.
                #    Up to 6 attempts over ~60 s. The contract is strict:
                #      • HTTP status MUST be 200
                #      • JSON response MUST contain "Status":"Healthy"
                #    Anything else (5xx, timeout, wrong body) → rollback.
                #
                #    On failure we set SmokeFailed=true; the next steps pick
                #    that up and (a) swap the previous build back into prod,
                #    (b) fail the stage so the team gets notified.
                - task: PowerShell@2
                  name: SmokeTest
                  displayName: 'Smoke test production /api/v1/health'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $url = "https://$(prodAppName).azurewebsites.net/api/v1/health"
                      Write-Host "Smoke testing: $url"
                      $passed = $false
                      for ($i = 1; $i -le 6; $i++) {
                        try {
                          $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
                          Write-Host "Attempt $i -> HTTP $($r.StatusCode)"
                          if ($r.StatusCode -eq 200) {
                            $body = $r.Content
                            Write-Host "Body: $body"
                            # Match either PascalCase or camelCase serialization
                            # ASP.NET Core defaults to camelCase, but be tolerant.
                            if ($body -match '"[Ss]tatus"\s*:\s*"Healthy"') {
                              $passed = $true
                              break
                            } else {
                              Write-Host "##[warning]200 OK but body did not contain status: Healthy"
                            }
                          }
                        } catch {
                          Write-Host "Attempt $i -> error: $($_.Exception.Message)"
                        }
                        Start-Sleep -Seconds 10
                      }
                      if ($passed) {
                        Write-Host "##vso[task.setvariable variable=SmokeFailed;isOutput=true]false"
                        Write-Host "##[section]Smoke test PASSED — production healthy"
                      } else {
                        Write-Host "##vso[task.setvariable variable=SmokeFailed;isOutput=true]true"
                        Write-Host "##[warning]Smoke test FAILED — will trigger automatic rollback"
                      }

                # 6) Auto-rollback: swap back if the smoke test failed.
                #    Production returns to the previous build instantly. The
                #    pipeline still fails so the team gets notified.
                - task: AzureAppServiceManage@0
                  displayName: 'AUTO-ROLLBACK: Swap back to previous build'
                  condition: eq(variables['SmokeTest.SmokeFailed'], 'true')
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    action: 'Swap Slots'
                    webAppName: '$(prodAppName)'
                    resourceGroupName: '$(prodResourceGroup)'
                    sourceSlot: '$(prodStagingSlot)'
                    swapWithProduction: true

                # 7) Fail the stage explicitly if smoke test failed, so the
                #    DevOps run is marked red and any downstream notifications
                #    (Teams, Slack, email) fire. The rollback in step 6 still
                #    runs before this — order matters.
                - task: PowerShell@2
                  displayName: 'Fail stage if smoke test failed'
                  condition: eq(variables['SmokeTest.SmokeFailed'], 'true')
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Error "Smoke test failed and an automatic rollback was performed. Investigate the failing build before re-promoting to Prod."
                      exit 1
