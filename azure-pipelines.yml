trigger:
  branches:
    include:
      - main

# PR validation: builds + tests run, but deploy stages skip on PR builds
# via the Build.Reason check below.
pr:
  branches:
    include:
      - "*"

parameters:
  - name: deployToProd
    displayName: Promote to Production after Dev succeeds?
    type: boolean
    default: false

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetSdkVersion: '8.0.x'
  apiProject: '1RadAPI/1RadAPI.csproj'
  testProjects: '1Rad.UnitTests/1Rad.UnitTests.csproj'

  # Dev
  devServiceConnection: 'onerad'
  devAppName: '1RadAPI'
  # Resource group that hosts the Dev App Service. Update if your Dev
  # resource group is named differently in your subscription.
  devResourceGroup: '1rad-dev-rg'

  # Prod (direct deploy to production slot — no staging slot)
  prodServiceConnection: 'onerad-prod'
  prodAppName: '1RadAPIProd'
  prodResourceGroup: 'website-prod-rg'

  # Full Prod URL (App Service URLs include a regional hash; the old
  # <appname>.azurewebsites.net pattern no longer resolves).
  prodAppUrl: 'https://1radapiprod-h6bxhde8hgdtctee.centralindia-01.azurewebsites.net'

stages:
  # ────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build & Test
  # Runs on every main push AND every PR (CI validation).
  # The published zip is uploaded as an artifact so both deploy stages
  # consume the SAME binary (no drift between environments).
  # ────────────────────────────────────────────────────────────────────────
  - stage: Build_and_Test
    displayName: Build & Test API
    jobs:
      - job: Build
        displayName: Restore / Build / Test / Publish
        timeoutInMinutes: 30
        steps:
          # ── Secret-leak guard ───────────────────────────────────────────
          # Fails the build if any committed appsettings*.json (except the
          # local Development file) contains a value that looks like a real
          # secret — DB password, Azure Storage account key, JWT secret, SMTP
          # app password, or a long access token. Catches accidental commits
          # before they ship to Prod.
          #
          # Bypass for one-off rescues: queue the run with a pipeline variable
          # SkipSecretScan=true (Pipelines → Run → Variables tab). Use sparingly.
          - task: PowerShell@2
            displayName: 'Scan appsettings*.json for committed secrets'
            inputs:
              targetType: 'inline'
              script: |
                if ($env:SkipSecretScan -eq 'true') {
                  Write-Host "##[warning]Secret scan SKIPPED (SkipSecretScan=true) — re-run without the bypass before shipping."
                  exit 0
                }

                $root = "$(Build.SourcesDirectory)"
                $files = Get-ChildItem -Path $root -Recurse -Filter "appsettings*.json" |
                         Where-Object {
                           $_.FullName -notmatch '\\(bin|obj|node_modules)\\' -and
                           $_.Name -ne 'appsettings.Development.json'
                         }

                # Pattern catalogue. Each regex looks for a KEY immediately
                # followed by a VALUE that looks like a real secret. Negative
                # look-aheads excuse placeholders/pipeline variables/env-var
                # references so the check stays signal-only.
                $patterns = @(
                  @{ Name = 'DB connection Password=';        Regex = 'Password\s*=\s*(?!\$\(|\$\{|YOUR|PLACEHOLDER|<)[^;""\s]{4,}' },
                  @{ Name = 'Azure Storage AccountKey=';      Regex = 'AccountKey\s*=\s*(?!\$\(|\$\{|YOUR|PLACEHOLDER|<)[A-Za-z0-9+/]{20,}={0,2}' },
                  @{ Name = 'SharedAccessKey=';               Regex = 'SharedAccessKey\s*=\s*(?!\$\(|\$\{)[A-Za-z0-9+/]{20,}={0,2}' },
                  @{ Name = 'JWT "Secret":"..."';             Regex = '"Secret"\s*:\s*"(?!\$\(|\$\{|YOUR|PLACEHOLDER|your-|change-me|<)[^"]{12,}"' },
                  @{ Name = 'SMTP "AppPassword":"..."';       Regex = '"AppPassword"\s*:\s*"(?!\$\(|\$\{|YOUR|PLACEHOLDER|<)[^"]{4,}"' },
                  @{ Name = 'Long "AccessToken":"..."';       Regex = '"AccessToken"\s*:\s*"(?!\$\(|\$\{|YOUR|PLACEHOLDER|<)[A-Za-z0-9_\-\.]{30,}"' },
                  @{ Name = 'Hex "ApiKey":"..."';             Regex = '"ApiKey"\s*:\s*"(?!\$\(|\$\{|YOUR|PLACEHOLDER|<)[A-Fa-f0-9]{24,}"' }
                )

                $violations = @()
                foreach ($file in $files) {
                  $lines = Get-Content -Path $file.FullName
                  for ($i = 0; $i -lt $lines.Count; $i++) {
                    $line = $lines[$i]
                    # Ignore lines inside the _README array (free-text guidance)
                    if ($line -match '^\s*"[^"]*"\s*,?\s*$' -and $line -notmatch '=' -and $line -notmatch ':\s*"[^"]*"\s*,?\s*$') { continue }
                    foreach ($p in $patterns) {
                      if ($line -match $p.Regex) {
                        $excerpt = $line.Trim()
                        if ($excerpt.Length -gt 100) { $excerpt = $excerpt.Substring(0, 100) + '...' }
                        $violations += [PSCustomObject]@{
                          File = $file.FullName.Replace($root, '').TrimStart('\','/')
                          Line = $i + 1
                          Pattern = $p.Name
                          Excerpt = $excerpt
                        }
                      }
                    }
                  }
                }

                if ($violations.Count -gt 0) {
                  Write-Host "##[error]Found $($violations.Count) potential secret(s) committed in appsettings*.json:"
                  foreach ($v in $violations) {
                    Write-Host ("  {0}:{1}  [{2}]  {3}" -f $v.File, $v.Line, $v.Pattern, $v.Excerpt)
                  }
                  Write-Host ""
                  Write-Host "##[error]Move these values to App Service Configuration (via the api-prod-secrets variable group) and rotate the leaked credentials immediately."
                  Write-Host "##[error]To bypass for an emergency build: queue with pipeline variable SkipSecretScan=true (and follow up with a clean-up commit)."
                  exit 1
                }
                Write-Host "##[section]No committed secrets detected in appsettings*.json"

          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetSdkVersion)'

          - task: DotNetCoreCLI@2
            displayName: 'Restore API'
            inputs:
              command: 'restore'
              projects: '$(apiProject)'

          - task: DotNetCoreCLI@2
            displayName: 'Build API'
            inputs:
              command: 'build'
              projects: '$(apiProject)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run Unit Tests'
            inputs:
              command: 'test'
              projects: '$(testProjects)'
              arguments: '--configuration $(buildConfiguration) --no-build --logger trx --collect:"XPlat Code Coverage"'
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(apiProject)'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish'
              zipAfterPublish: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish API artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/publish'
              artifact: 'api-package'
              publishLocation: 'pipeline'

  # ────────────────────────────────────────────────────────────────────────
  # Stage 2 — Deploy to Dev App Service
  # Auto-deploys on main. Skipped on PR builds.
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployDev
    displayName: Deploy to Dev (App Service)
    dependsOn: Build_and_Test
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    variables:
      # Mirror of api-prod-secrets but holding the DEV values. Every secret
      # variable inside must be marked 🔒 in the DevOps Library UI — the
      # AzureAppServiceSettings task echoes the data payload in plaintext
      # otherwise.
      - group: api-dev-secrets
    jobs:
      - deployment: DeployDev
        displayName: Push to Dev App Service
        environment: 'Dev-API'
        timeoutInMinutes: 30
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: api-package

                - script: |
                    echo ===== DEV DEPLOY =====
                    echo Commit:     $(Build.SourceVersion)
                    echo Branch:     $(Build.SourceBranchName)
                    echo Queued by:  $(Build.RequestedFor)
                    echo App:        $(devAppName)
                  displayName: 'Dev deploy audit log'

                # 1) Apply Dev app settings + connection strings BEFORE the
                #    zip deploy. Same shape as the Prod stage's settings
                #    block — same key names, just dev values.
                #
                #    ASPNETCORE_ENVIRONMENT=Development is set here so the
                #    exception-handler returns verbose error bodies on the
                #    Dev API (real stack trace) without manual Portal config.
                - task: AzureAppServiceSettings@1
                  displayName: 'Apply Dev app settings + connection strings'
                  inputs:
                    azureSubscription: '$(devServiceConnection)'
                    appName: '$(devAppName)'
                    resourceGroupName: '$(devResourceGroup)'
                    appSettings: |
                      [
                        { "name": "ASPNETCORE_ENVIRONMENT",     "value": "Development",          "slotSetting": false },
                        { "name": "ASPNETCORE_DETAILEDERRORS", "value": "true",                 "slotSetting": false },
                        { "name": "Jwt__Secret",               "value": "$(DevJwtSecret)",      "slotSetting": false },
                        { "name": "Smtp__AppPassword",         "value": "$(DevSmtpAppPassword)","slotSetting": false },
                        { "name": "WhatsApp__AccessToken",     "value": "$(DevWhatsAppToken)",  "slotSetting": false }
                      ]
                    connectionStrings: |
                      [
                        { "name": "DefaultConnection",  "value": "$(DevDbConnectionString)",        "type": "SQLAzure", "slotSetting": false },
                        { "name": "AzureBlobStorage",   "value": "$(DevAzureBlobConnectionString)", "type": "Custom",   "slotSetting": false }
                      ]

                # 2) Push the zip to the Dev App Service.
                - task: AzureWebApp@1
                  displayName: 'Deploy to Dev App Service'
                  inputs:
                    azureSubscription: '$(devServiceConnection)'
                    appType: 'webApp'
                    appName: '$(devAppName)'
                    package: '$(Pipeline.Workspace)/api-package/**/*.zip'

  # ────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy to Prod App Service (DIRECT deploy, no slot)
  # Runs ONLY when:
  #   (1) Dev deploy succeeded
  #   (2) The run was queued with deployToProd: true
  #   (3) An approver clicks Approve on the 'Production-API' environment.
  #
  # Approval is configured in Azure DevOps → Pipelines → Environments →
  # Production-API → Approvals and checks.
  #
  # Flow:
  #   1) Apply Prod settings + connection strings directly to production
  #   2) Deploy the zip directly to the production slot (brief 10-30s restart)
  #   3) Smoke test the live URL — if it fails, the stage fails and the team
  #      gets notified. Recovery: re-queue an earlier successful pipeline run.
  # ────────────────────────────────────────────────────────────────────────
  - stage: DeployProd
    displayName: Deploy to Prod (App Service)
    dependsOn: DeployDev
    condition: and(succeeded(), eq('${{ parameters.deployToProd }}', true), ne(variables['Build.Reason'], 'PullRequest'))
    variables:
      # Variable group `api-prod-secrets` holds the Prod connection strings,
      # JWT keys, third-party API keys, etc. Each variable MUST be marked as
      # 'secret' (🔒) in the DevOps Library UI — otherwise the values appear
      # in plaintext in the build logs.
      - group: api-prod-secrets
    jobs:
      - deployment: DeployProd
        displayName: Deploy directly to Prod
        environment: 'Production-API'
        timeoutInMinutes: 60
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: api-package

                - script: |
                    echo ===== PROD DEPLOY =====
                    echo Commit:     $(Build.SourceVersion)
                    echo Branch:     $(Build.SourceBranchName)
                    echo Queued by:  $(Build.RequestedFor)
                    echo Pipeline:   $(Build.BuildNumber)
                    echo App:        $(prodAppName)
                    echo RG:         $(prodResourceGroup)
                  displayName: 'Prod deploy audit log'

                # 1) Push Prod app settings + connection strings directly to
                #    the PRODUCTION slot. .NET nested config uses '__' as the
                #    section separator (Jwt:Secret ↔ Jwt__Secret).
                #    Each value references a secret variable from the
                #    'api-prod-secrets' variable group.
                - task: AzureAppServiceSettings@1
                  displayName: 'Apply Prod app settings + connection strings'
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    appName: '$(prodAppName)'
                    resourceGroupName: '$(prodResourceGroup)'
                    appSettings: |
                      [
                        { "name": "ASPNETCORE_DETAILEDERRORS", "value": "false",                "slotSetting": false },
                        { "name": "ASPNETCORE_ENVIRONMENT",    "value": "Production",           "slotSetting": false },
                        { "name": "Jwt__Secret",               "value": "$(ProdJwtSecret)",     "slotSetting": false },
                        { "name": "Smtp__AppPassword",         "value": "$(ProdSmtpAppPassword)","slotSetting": false },
                        { "name": "WhatsApp__AccessToken",     "value": "$(ProdWhatsAppToken)", "slotSetting": false }
                      ]
                    connectionStrings: |
                      [
                        { "name": "DefaultConnection",  "value": "$(ProdDbConnectionString)",      "type": "SQLAzure", "slotSetting": false },
                        { "name": "AzureBlobStorage",   "value": "$(ProdAzureBlobConnectionString)","type": "Custom",   "slotSetting": false }
                      ]

                # 2) Push the zip to the production slot directly.
                #    Brief restart (10-30s of 503s) while the app cold-starts.
                - task: AzureWebApp@1
                  displayName: 'Deploy to Prod App Service'
                  inputs:
                    azureSubscription: '$(prodServiceConnection)'
                    appType: 'webApp'
                    appName: '$(prodAppName)'
                    package: '$(Pipeline.Workspace)/api-package/**/*.zip'

                # 3) Smoke test the LIVE production /api/v1/health endpoint.
                #    Up to 8 attempts over ~80 s — gives the cold-starting
                #    production slot enough time to come back online before
                #    declaring failure. Strict contract:
                #      • HTTP status MUST be 200
                #      • JSON response MUST contain "status":"Healthy"
                #    Anything else (5xx, timeout, wrong body) → fail the stage.
                #
                #    Recovery if this fails: re-queue an earlier successful
                #    pipeline run (which deploys the previous good build).
                - task: PowerShell@2
                  name: SmokeTest
                  displayName: 'Smoke test production /api/v1/health'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $url = "$(prodAppUrl)/api/v1/health"
                      Write-Host "Smoke testing: $url"
                      $passed = $false
                      for ($i = 1; $i -le 8; $i++) {
                        try {
                          $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
                          Write-Host "Attempt $i -> HTTP $($r.StatusCode)"
                          if ($r.StatusCode -eq 200) {
                            $body = $r.Content
                            Write-Host "Body: $body"
                            if ($body -match '"[Ss]tatus"\s*:\s*"Healthy"') {
                              $passed = $true
                              break
                            } else {
                              Write-Host "##[warning]200 OK but body did not contain status: Healthy"
                            }
                          }
                        } catch {
                          Write-Host "Attempt $i -> error: $($_.Exception.Message)"
                        }
                        Start-Sleep -Seconds 10
                      }
                      if ($passed) {
                        Write-Host "##[section]Smoke test PASSED — production healthy"
                      } else {
                        Write-Error "Smoke test FAILED — production may be unhealthy. To recover, re-queue an earlier successful pipeline run."
                        exit 1
                      }
